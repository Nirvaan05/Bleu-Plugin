name: Markdown link check

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "PRIVACY.md"
      - "CHANGELOG.md"
      - ".github/workflows/markdown-link-check.yml"
  pull_request:
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "PRIVACY.md"
      - "CHANGELOG.md"
  schedule:
    # Weekly, Monday 06:00 UTC, to catch links that rot over time.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check links in root docs
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Explicit file list only. The skill content under plugins/** and the
          # example workspace under blueprint/** reference runtime-generated and
          # external citation URLs that are out of scope for a public-docs check.
          args: >-
            --no-progress
            --accept 200,206,429
            --max-retries 3
            --exclude 'github\.com/Nirvaan05/Bleu-plugin/security/advisories/new'
            README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md PRIVACY.md CHANGELOG.md
          fail: true
